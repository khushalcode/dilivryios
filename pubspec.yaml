name: sixam_mart_delivery
description: A new Flutter application.
publish_to: 'none'
version: 3.0.0+5

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get:
    git:
      url: https://github.com/luis901101/getx_fork.git
      ref: old-4.7.0
  shared_preferences: ^2.5.3
  connectivity_plus: ^7.0.0
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.2
  firebase_auth: ^6.1.0
  flutter_local_notifications: ^19.4.2
  path_provider: ^2.1.5
  pin_code_fields: ^8.0.1
  http: ^1.5.0
  flutter_switch: ^0.3.2
  shimmer_animation: ^2.2.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.13.1
  url_launcher: ^6.3.2
  vibration: ^3.1.4
  image_picker: ^1.2.0
  phone_numbers_parser: ^9.0.15
  country_code_picker: ^3.4.1
  audioplayers: ^6.5.1
  flutter_widget_from_html_core: ^0.15.0
  cached_network_image: ^3.4.1
  path: ^1.9.1
  http_parser: ^4.1.2
  intl: ^0.20.2
  dotted_border: ^3.1.0
  photo_view: ^0.15.0
  web_socket_channel: ^3.0.3
  flutter_inappwebview: ^6.1.5
  just_the_tooltip: ^0.0.12
  flutter_svg: ^2.2.1
  permission_handler: ^12.0.1
  flutter_foreground_task: ^9.1.0
  dropdown_button2: ^2.3.9
  open_file: ^3.5.10
  carousel_slider: ^5.1.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/image/
    - assets/language/
    - assets/notification.mp3

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/font/Poppins-Regular.ttf
          weight: 400
        - asset: assets/font/Poppins-Medium.ttf
          weight: 500
        - asset: assets/font/Poppins-Bold.ttf
          weight: 700
        - asset: assets/font/Poppins-Black.ttf
          weight: 900
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/image/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
